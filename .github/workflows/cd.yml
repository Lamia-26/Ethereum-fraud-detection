# TP Seance 19 - Livraison continue (CD) avec GitHub Actions
#
# Placez ce fichier dans .github/workflows/ a la RACINE de votre depot.
# Votre mission : completer les TODO (S19-n) pour que, sur la branche main et
# sur les tags de version, l'image Docker de l'API soit construite et poussee
# sur le registre de conteneurs de GitHub (GHCR : ghcr.io).
#
# Rappels :
#   - GHCR s'authentifie avec le jeton automatique secrets.GITHUB_TOKEN et
#     l'utilisateur github.actor.
#   - Pousser un package requiert la permission `packages: write`.
#   - Le Dockerfile de l'API du projet todo est dans docker/Dockerfile.api.
name: CD

# S19-1 : declencher sur push de la branche `main` ET sur les tags vX.Y.Z
on:
  push:
    branches: ["main"]
    tags: ["v*.*.*"]

# Pas d'annulation en cours : on ne veut pas interrompre une livraison.
concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build-push:
    name: Build & push de l'image API (GHCR)
    runs-on: ubuntu-latest
    # S19-2 : autoriser ce job a ecrire des packages sur GHCR
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout du depot
        uses: actions/checkout@v4

      - name: Mise en place de Buildx
        uses: docker/setup-buildx-action@v3

      # S19-3 : connexion a ghcr.io
      - name: Connexion a GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # S19-4 : calcul des tags et labels
      - name: Calcul des tags et labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/mlproject-api
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha
            type=semver,pattern={{version}}

      # S19-5 : build et push de l'image
      - name: Build & push de l'image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.api
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
