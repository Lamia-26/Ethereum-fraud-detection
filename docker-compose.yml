# Seance 14 - TP docker-compose : orchestrez votre stack de classification.
# Squelette a completer (marqueurs TODO S14-n). Voir tp/TP_S14_docker_compose.md.
#
# Services : mlflow (suivi), train (entrainement one-shot, profil "train"),
#            api (FastAPI) et frontend (Streamlit).
#
# Commandes (depuis la racine du projet) :
#   docker compose up -d mlflow
#   docker compose --profile train run --rm train
#   docker compose up -d api
#   -> API sur http://localhost:8000

services:
  mlflow:
    image: ghcr.io/mlflow/mlflow:v3.13.0
    command: >
      mlflow server
      --host 0.0.0.0 --port 5000
      --backend-store-uri sqlite:////mlflow/mlflow.db
      --artifacts-destination /mlflow/artifacts
      --serve-artifacts
      --allowed-hosts "*"
    ports:
      - "5000:5000"
    volumes:
      - mlflow_data:/mlflow

  train:
    build:
      context: .
      dockerfile: docker/Dockerfile.train
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
    depends_on:
      - mlflow
    volumes:
      - models_data:/app/models
    profiles:
      - train

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
    # S14-1 : exposition du port 8000
    ports:
      - "8000:8000"
    # S14-2 : volume models_data en lecture seule pour lire le modele
    volumes:
      - models_data:/app/models:ro
    # S14-3 : healthcheck sur GET /health
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request;urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 5s
      timeout: 5s
      retries: 10

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    # S14-4 : URL de l'API et MLflow via les noms de services internes Docker
    environment:
      API_URL: http://api:8000
      API_EXTERNAL_URL: ${API_EXTERNAL_URL:-http://141.253.125.253:8000}
      MLFLOW_TRACKING_URI: http://mlflow:5000
      MLFLOW_EXTERNAL_URL: ${MLFLOW_EXTERNAL_URL:-http://141.253.125.253:5000}
    # S14-5 : exposition du port 8501
    ports:
      - "8501:8501"
    # S14-6 : attend que l'API soit saine avant de demarrer
    depends_on:
      api:
        condition: service_healthy

  airflow:
    build:
      context: .
      dockerfile: docker/Dockerfile.airflow
    environment:
      AIRFLOW__CORE__EXECUTOR: SequentialExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: sqlite:////opt/airflow/airflow.db
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__WEBSERVER__SECRET_KEY: "ethereum-fraud-mlops-secret"
      _AIRFLOW_WWW_USER_USERNAME: admin
      _AIRFLOW_WWW_USER_PASSWORD: admin
      API_URL: http://api:8000
      MLFLOW_TRACKING_URI: http://mlflow:5000
      PYTHONPATH: /opt/airflow/src
    ports:
      - "8080:8080"
    volumes:
      - ./dags:/opt/airflow/dags
      - ./src:/opt/airflow/src
      - ./data:/opt/airflow/data
      - airflow_data:/opt/airflow
    command: >
      bash -c "
        airflow db migrate &&
        airflow users create --username $${_AIRFLOW_WWW_USER_USERNAME} --password $${_AIRFLOW_WWW_USER_PASSWORD} --firstname Admin --lastname Admin --role Admin --email admin@local.com 2>/dev/null || true &&
        airflow scheduler &
        airflow webserver --port 8080
      "
    depends_on:
      api:
        condition: service_healthy

volumes:
  mlflow_data:
  models_data:
  airflow_data:
